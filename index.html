<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>DBR RP SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#04130b;
color:white;
transition:0.3s;
}

header{
text-align:center;
padding:25px;
background:#06351f;
color:#00ff88;
text-shadow:0 0 10px #00ff88;
}

.box{
max-width:500px;
margin:10px auto;
padding:15px;
border:1px solid #00ff88;
border-radius:10px;
background:#0a1f14;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:8px;
background:#062015;
color:white;
}

button{
width:100%;
padding:10px;
background:#00ff88;
border:none;
cursor:pointer;
font-weight:bold;
margin-top:5px;
}

button:hover{box-shadow:0 0 10px #00ff88;}

#portal{display:none;}

/* PROFILE */
.profile{
max-width:500px;
margin:10px auto;
padding:15px;
border:1px solid #00ff88;
border-radius:10px;
background:#0a1f14;
}

/* COLORS */
.blue{background:#1e66ff !important;}
.gold{background:#d4af37 !important;color:black !important;}
.red{background:#ff3b3b !important;}
.green{background:#00ff88 !important;}

/* ADMIN */
#adminPanel{display:none;}
</style>
</head>

<body>

<header>
<h1>DBR RP SYSTEM</h1>
</header>

<!-- REGISTER -->
<div id="auth">
<div class="box">
<h2>📝 Реєстрація</h2>

<input id="name" placeholder="Ім'я">
<input id="rank" placeholder="Звання">
<input id="badge" placeholder="Жетон">
<input id="car" placeholder="Номер авто">

<button onclick="register()">Старт</button>
</div>
</div>

<!-- PORTAL -->
<div id="portal">

<div class="profile" id="profileBox">
<h3>👤 Профіль</h3>
<p>Ім'я: <span id="p_name"></span></p>
<p>Звання: <span id="p_rank"></span></p>
<p>Авто: <span id="p_car"></span></p>
<p>DB: <span id="p_db"></span></p>
<p>Колір: <span id="p_color"></span></p>
</div>

<!-- SHOP -->
<div class="box">
<h2>🛒 Магазин кольорів</h2>

<button onclick="buyColor('blue',500)">Синій - 500 DB</button>
<button onclick="buyColor('gold',1000)">Золотий - 1000 DB</button>
<button onclick="buyColor('red',500)">Червоний - 500 DB</button>
</div>

<!-- ADMIN -->
<div class="box">
<h2>🛠
